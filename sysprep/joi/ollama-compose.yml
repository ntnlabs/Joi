# Ollama container — Joi VM
#
# Replaces the imperative `docker run` documented in stage3.md.
# Apply with:
#   sudo docker compose -f /opt/joi/ollama/docker-compose.yml up -d
#
# Update version:
#   1. Edit `image:` tag below
#   2. `sudo docker compose -f /opt/joi/ollama/docker-compose.yml pull`
#   3. `sudo docker compose -f /opt/joi/ollama/docker-compose.yml up -d`
#   (Data volume `ollama` persists across container recreations.)
#
# Rollback: edit `image:` back to previous tag, `up -d` again.

services:
  ollama:
    image: ollama/ollama:0.30.7
    container_name: ollama
    restart: unless-stopped
    # Use the default docker0 bridge network (same as `docker run` without
    # --network flag). Without this, compose creates a project-scoped network
    # whose iptables DNAT rules don't catch loopback (127.0.0.1) traffic on
    # the host — joi-api hits `localhost:11434` and gets ReadTimeout while
    # 10.42.0.10:11434 works fine. Pin to bridge so localhost routing works.
    network_mode: bridge
    ports:
      - "11434:11434"
    environment:
      # Bind to all interfaces inside the container so the published
      # port reaches the host.
      - OLLAMA_HOST=0.0.0.0:11434
      # Disable cloud routing (cloud models, ollama.com remotes,
      # model recommendation refresh). Joi VM is air-gapped — explicit
      # disable removes the failed-connection log noise and prevents
      # any accidental future leak. Added in ollama 0.30.x; was the
      # reason we noticed `OLLAMA_NO_CLOUD: false` in startup logs.
      - OLLAMA_NO_CLOUD=1
      # Disable llama.cpp auto-fit. Added in llama.cpp builds used by
      # ollama 0.30.x — the "fitting params to device memory" step
      # crashes with `GGML_ASSERT(n_inputs < GGML_SCHED_MAX_SPLIT_INPUTS)`
      # on gemma4 + GTX 1650 + ctx >= 7500 during the layer-fitting
      # search. With FIT=off, layers are placed by the old static
      # algorithm which works fine for this GPU/model combo.
      - LLAMA_ARG_FIT=off
    volumes:
      - ollama:/root/.ollama
    # Cap docker log retention. ollama 0.30.7 hardcodes `--log-verbosity 4`
    # in llm/llama_server.go (no env override exists upstream), which spams
    # ~30 KB/min of per-token `slot`/`srv` lines during inference. Default
    # json-file driver retains forever, so unbounded growth fills the disk.
    # 3 files × 20 MB = 60 MB ring buffer; `docker logs ollama` still shows
    # the recent window for debugging, anything older rotates out.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama:
    # Reuse the existing docker volume created by the original
    # `docker run -v ollama:/root/.ollama ...` invocation. external=true
    # tells compose NOT to create a new one — preserves all models.
    external: true
